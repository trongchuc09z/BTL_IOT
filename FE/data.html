<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Smart Car - Data</title>
	<script>document.documentElement.dataset.theme = localStorage.getItem('smart-home-theme') || 'dark';</script>
	<link rel="stylesheet" href="data.css" />
	<link rel="stylesheet" href="theme.css" />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
	<aside class="sidebar">
		<div class="sidebar-inner">
			<div class="brand">
				<img class="logo" src="https://i.ebayimg.com/thumbs/images/g/nvYAAOSwobJkYsi8/s-l640.jpg"
					alt="Smart Car Logo" />
				<span class="brand-title">Smart Home</span>
			</div>

			<nav class="nav-menu">
				<button class="menu-item" onclick="navigateTo('dashboard.html')">
					<i class="fas fa-home"></i>
					<span>Dashboard</span>
				</button>
				<button class="menu-item active" onclick="navigateTo('data.html')">
					<i class="fas fa-database"></i>
					<span>Data</span>
				</button>
				<button class="menu-item" onclick="navigateTo('history.html')">
					<i class="fas fa-history"></i>
					<span>History</span>
				</button>
				<button class="menu-item" onclick="navigateTo('device_stats.html')">
					<i class="fas fa-chart-bar"></i>
					<span>Statistics</span>
				</button>
				<button class="menu-item" onclick="navigateTo('profile.html')">
					<i class="fas fa-user"></i>
					<span>Profile</span>
				</button>
			</nav>

			<div class="theme-toggle">
				<span class="theme-toggle-label">Appearance</span>
				<button class="theme-toggle-button" type="button" aria-label="Switch theme">
					<i class="fas fa-sun"></i>
					<span class="theme-toggle-text">Light Mode</span>
				</button>
			</div>

			<div class="user">
				<img class="avatar" src="AnhCV.PNG" alt="user" />
				<div class="user-info">
					<span class="username">Nguyễn Trọng Chức</span>
					<span class="user-role">Admin</span>
				</div>
			</div>
		</div>
	</aside>

	<div class="page">
		<div class="main-area">
			<main class="container">
				<div class="data-header">
					<h1>Sensor Data Records</h1>
					<div class="filters">
						<div class="filter-dropdown">
							<select id="filterSelect">
								<option value="timestamp" selected>Theo thời gian</option>
								<option value="value">Theo giá trị</option>
							</select>
						</div>
						<div class="sensor-dropdown">
							<select id="sensorTypeSelect">
								<option value="all" selected>Tất cả cảm biến</option>
								<option value="temperature">Nhiệt độ</option>
								<option value="humidity">Độ ẩm</option>
								<option value="light">Ánh sáng</option>
							</select>
						</div>
						<div class="search-box">
							<input type="text" id="searchInput" aria-label="Lọc dữ liệu cảm biến">
						</div>
						<div class="records-dropdown">
							<select id="recordsPerPage">
								<option value="5" selected>5 bản ghi</option>
								<option value="10">10 bản ghi</option>
								<option value="20">20 bản ghi</option>
								<option value="50">50 bản ghi</option>
							</select>
						</div>
					</div>
				</div>

				<div class="data-table-container">
					<table class="data-table">
						<thead>
							<tr>
								<th class="sortable" data-column="id">
									ID <span class="sort-icon">⇅</span>
								</th>
								<th class="sortable" data-column="temperature">
									Nhiệt độ (°C) <span class="sort-icon">⇅</span>
								</th>
								<th class="sortable" data-column="luminosity">
									Ánh sáng (lux) <span class="sort-icon">⇅</span>
								</th>
								<th class="sortable" data-column="humidity">
									Độ ẩm (%) <span class="sort-icon">⇅</span>
								</th>
								<th class="sortable" data-column="timestamp">
									Thời gian <span class="sort-icon">⇅</span>
								</th>
							</tr>
						</thead>
						<tbody id="dataTableBody">
							<tr>
								<td colspan="5" style="text-align: center; padding: 20px;">Đang tải dữ liệu...</td>
							</tr>
						</tbody>
					</table>
				</div>

				<div class="pagination">
					<button class="pagination-btn" id="prevBtn" onclick="changePage(-1)">Previous</button>
					<div class="page-numbers">
						<button class="page-number active" onclick="goToPage(1)">1</button>
						<button class="page-number" onclick="goToPage(2)">2</button>
						<button class="page-number" onclick="goToPage(3)">3</button>
						<button class="page-number" onclick="goToPage(4)">4</button>
						<button class="page-number" onclick="goToPage(5)">5</button>
					</div>
					<button class="pagination-btn" id="nextBtn" onclick="changePage(1)">Next</button>
				</div>
			</main>
		</div>
	</div>

	<script>
		// Navigation function
		function navigateTo(page) {
			window.location.href = page;
		}

		let currentPage = 1;
		let recordsPerPage = 5;
		let sortColumn = 'timestamp';
		let sortDirection = 'desc';
		let filterDebounce;

		const filterMapping = {
			"timestamp": "Time",
			"value": "Value"
		};

		const sortMapping = {
			"id": "Time",
			"temperature": "Temperature",
			"humidity": "Humidity",
			"luminosity": "Light",
			"timestamp": "Time"
		};

		const filterSelect = document.getElementById('filterSelect');
		const sensorTypeSelect = document.getElementById('sensorTypeSelect');
		const searchInput = document.getElementById('searchInput');
		const recordsPerPageSelect = document.getElementById('recordsPerPage');

		function updateFilterInput(resetValue = false) {
			if (resetValue) {
				searchInput.value = '';
			}

			if (filterSelect.value === 'timestamp') {
				searchInput.type = 'text';
				searchInput.placeholder = 'VD: 2026, 4/2026, 3/4/2026, 15 3/4/2026, 15:50 3/4/2026, 15:50:45 3/4/2026';
				searchInput.removeAttribute('step');
				searchInput.inputMode = 'text';
			} else {
				searchInput.type = 'text';
				searchInput.placeholder = 'Nhập giá trị cảm biến';
				searchInput.removeAttribute('step');
				searchInput.inputMode = 'text';
			}
		}

		async function fetchBackendData() {
			const filterKey = filterSelect.value;
			
			const searchValue = searchInput.value.trim();

			const sensorTypeValue = sensorTypeSelect ? sensorTypeSelect.value : 'all';
			const sensorTypeParam = sensorTypeValue === 'all' ? '' : (sensorTypeValue === 'temperature' ? 'Temperature' : (sensorTypeValue === 'humidity' ? 'Humidity' : 'Light'));
			let typeSearch;
			if (filterKey === 'timestamp') {
				typeSearch = 'Time';
			} else if (filterKey === 'value') {
				if (sensorTypeValue && sensorTypeValue !== 'all') {
					// tìm kiếm trong cột cảm biến đã chọn
					typeSearch = sensorTypeParam || 'Value';
				} else {
					typeSearch = 'Value';
				}
			} else {
				typeSearch = filterMapping[filterKey] || 'Time';
			}

			const typeSort = sortMapping[sortColumn] || "Time"; // Mặc định sắp xếp theo thời gian nếu sortColumn không khớp
			const sortOrder = sortDirection === 'desc' ? 'Decrease' : 'Increase';
			const shouldClientFilterExact = (filterKey === 'value' && sensorTypeValue && sensorTypeValue !== 'all' && searchValue !== '');
			const fetchPageSize = shouldClientFilterExact ? Math.max(recordsPerPage * 5, recordsPerPage) : recordsPerPage;

			try {
				let url = `http://localhost:9999/api/get_history_data_sensor?typeSearch=${typeSearch}&value=${encodeURIComponent(searchValue)}&typeSort=${typeSort}&sort=${sortOrder}&page=${currentPage}&pageSize=${fetchPageSize}`;
				if (sensorTypeParam) url += `&sensorType=${encodeURIComponent(sensorTypeParam)}`;
				const response = await fetch(url);
				if (!response.ok) throw new Error("API Lỗi");
				const result = await response.json();
				
				if (result && result.data) {
					let data = result.data;
					if (filterKey === 'value' && sensorTypeValue && sensorTypeValue !== 'all' && searchValue !== '') {
						const fieldMap = { temperature: 'Temperature', humidity: 'Humidity', light: 'Light' };
						const field = fieldMap[sensorTypeValue];
						if (field) {
							const numSearch = parseFloat(searchValue); // Cố gắng chuyển giá trị tìm kiếm thành số để so sánh gần đúng nếu có thể
							const numericSearch = isFinite(numSearch); // Kiểm tra nếu giá trị tìm kiếm có thể chuyển thành số để so sánh gần đúng, nếu không sẽ so sánh chuỗi
							data = data.filter(item => {
								const val = item[field];
								if (val === null || val === undefined) return false;
								const numVal = parseFloat(val);
								if (numericSearch && isFinite(numVal)) {
									return Math.abs(numVal - numSearch) < 0.0001;
								} else {
									return String(val).toLowerCase() === searchValue.toLowerCase();
								}
							});
						}
					}
					const usedMeta = shouldClientFilterExact ? { current_page: 1, total_page: 1 } : result.meta;
					const dataToDisplay = shouldClientFilterExact ? data.slice(0, recordsPerPage) : data;
					displayTable(dataToDisplay);
					updatePagination(usedMeta || { current_page: 1, total_page: 1 });
				} else {
					displayTable([]);
					updatePagination({ current_page: 1, total_page: 1 });
				}
			} catch (err) {
				console.error("Lỗi lấy dữ liệu:", err);
				displayTable([]);
				updatePagination({ current_page: 1, total_page: 1 });
			}
		}

		function formatDate(dateObj) {
			if (!dateObj) return "";
			const d = new Date(dateObj);
			return d.toLocaleString('vi-VN');
		}

		function performFilter() {	// Hàm này sẽ được gọi sau khi debounce hoặc khi người dùng nhấn Enter
			currentPage = 1;
			fetchBackendData();
		}

		function scheduleFilter() {
			clearTimeout(filterDebounce);
			filterDebounce = setTimeout(performFilter, 300);
		}

		function performFilterImmediately() {
			clearTimeout(filterDebounce); // mỗi lần người dùng nhập, xóa timeout cũ rồi tạo timeout mới (reset timer) — chỉ khi người dùng ngừng gõ trong 300ms thì performFilter mới chạy.
			performFilter();
		}

		function updateSortIcons() {
			document.querySelectorAll('.sortable').forEach(header => {
				const icon = header.querySelector('.sort-icon');
				if (!icon) return;

				const column = header.getAttribute('data-column');
				if (column === sortColumn) {
					icon.textContent = sortDirection === 'asc' ? '↑' : '↓';
				} else {
					icon.textContent = '⇅';
				}
			});
		}

		searchInput.addEventListener('input', scheduleFilter);
		searchInput.addEventListener('change', performFilterImmediately); // Để xử lý khi người dùng dán giá trị hoặc sử dụng trình duyệt tự động điền
		searchInput.addEventListener('keypress', function (e) {
			if (e.key === 'Enter') {
				performFilterImmediately();
			}
		});
		// Filter type change Value hoặc Timestamp
		filterSelect.addEventListener('change', function () {
			updateFilterInput(true); 
			performFilterImmediately();
		});
		// Record filter
		recordsPerPageSelect.addEventListener('change', function (e) {
			recordsPerPage = parseInt(e.target.value);
			currentPage = 1;
			fetchBackendData();
		});

		// Sensor filter
		sensorTypeSelect.addEventListener('change', function () {
			currentPage = 1;
			fetchBackendData();
		});

		function onSortHeaderClick() {
			const column = this.getAttribute('data-column');

			if (sortColumn === column) {
				sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
			} else {
				sortColumn = column;
				sortDirection = 'asc';
			}

			updateSortIcons();
			fetchBackendData();
		}

		function attachSortHandlers() { // Cần gọi lại sau mỗi lần cập nhật bảng vì các header có thể đã bị thay thế trong innerHTML
			document.querySelectorAll('.sortable').forEach(header => {
				header.removeEventListener('click', onSortHeaderClick);
				header.addEventListener('click', onSortHeaderClick);
			});
		}

		function displayTable(pageData) {
			const tbody = document.getElementById('dataTableBody');
			tbody.innerHTML = '';
			const sensorTypeValue = sensorTypeSelect ? sensorTypeSelect.value : 'all';
			// Update table header to show only the selected sensor column when applicable
			const thead = document.querySelector('.data-table thead');
			if (sensorTypeValue && sensorTypeValue !== 'all') {
				let sensorLabel = 'Sensor';
				if (sensorTypeValue === 'temperature') sensorLabel = 'Nhiệt độ (°C)';
				if (sensorTypeValue === 'humidity') sensorLabel = 'Độ ẩm (%)';
				if (sensorTypeValue === 'light') sensorLabel = 'Ánh sáng (lux)';
				thead.innerHTML = `
					<tr>
						<th class="sortable" data-column="id">ID <span class="sort-icon">⇅</span></th>
						<th class="sortable" data-column="selectedSensor">${sensorLabel} <span class="sort-icon">⇅</span></th>
						<th class="sortable" data-column="timestamp">Thời gian <span class="sort-icon">⇅</span></th>
					</tr>
				`;
			} else {
				thead.innerHTML = `
					<tr>
						<th class="sortable" data-column="id">ID <span class="sort-icon">⇅</span></th>
						<th class="sortable" data-column="temperature">Nhiệt độ (°C) <span class="sort-icon">⇅</span></th>
						<th class="sortable" data-column="luminosity">Ánh sáng (lux) <span class="sort-icon">⇅</span></th>
						<th class="sortable" data-column="humidity">Độ ẩm (%) <span class="sort-icon">⇅</span></th>
						<th class="sortable" data-column="timestamp">Thời gian <span class="sort-icon">⇅</span></th>
					</tr>
				`;
			}

			if (!pageData || pageData.length === 0) {
				const row = document.createElement('tr');
				const cols = (sensorTypeValue && sensorTypeValue !== 'all') ? 3 : 5;
				row.innerHTML = `
					<td colspan="${cols}" style="text-align: center; padding: 40px; color: rgba(255, 255, 255, 0.5); font-size: 16px;">
						<i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 16px; display: block; opacity: 0.3;"></i>
						Không có dữ liệu
					</td>
				`;
				tbody.appendChild(row);
			} else {
				pageData.forEach(item => {
					const row = document.createElement('tr');
					if (sensorTypeValue && sensorTypeValue !== 'all') {
						let value = '';
						if (sensorTypeValue === 'temperature') value = item.Temperature;
						else if (sensorTypeValue === 'humidity') value = item.Humidity;
						else if (sensorTypeValue === 'light') value = item.Light;
						row.innerHTML = `
							<td>${item.Id}</td>
							<td>${value}</td>
							<td>${formatDate(item.Time)}</td>
						`;
					} else {
						row.innerHTML = `
							<td>${item.Id}</td>
							<td>${item.Temperature}</td>
							<td>${item.Light}</td>
							<td>${item.Humidity}</td>
							<td>${formatDate(item.Time)}</td>
						`;
					}
					tbody.appendChild(row);
				});
			}

			// Sau khi cập nhật bảng, cần gắn lại sự kiện cho các header có thể sắp xếp vì chúng đã bị thay thế trong innerHTML
			attachSortHandlers();
			updateSortIcons();
		}

		function updatePagination(meta) {
			const totalPages = meta.total_page || 1;
			currentPage = meta.current_page || 1;

			const pageNumbers = document.querySelector('.page-numbers');
			pageNumbers.innerHTML = '';

			const pagesToRender = new Set([1, totalPages]);
			for (let i = currentPage - 1; i <= currentPage + 1; i++) {
				if (i >= 1 && i <= totalPages) {
					pagesToRender.add(i);
				}
			}

			const sortedPages = Array.from(pagesToRender).sort((a, b) => a - b);
			let previousPage = 0;

			sortedPages.forEach((page) => {
				if (previousPage && page - previousPage > 1) {
					const ellipsis = document.createElement('span');
					ellipsis.className = 'page-ellipsis';
					ellipsis.textContent = '...';
					pageNumbers.appendChild(ellipsis);
				}

				const button = document.createElement('button');
				button.className = `page-number ${page === currentPage ? 'active' : ''}`;
				button.textContent = page;
				button.onclick = () => goToPage(page);
				pageNumbers.appendChild(button);
				previousPage = page;
			});

			document.getElementById('prevBtn').disabled = currentPage <= 1;
			document.getElementById('nextBtn').disabled = currentPage >= totalPages;
		}

		function changePage(direction) {
			currentPage += direction;
			fetchBackendData();
		}

		function goToPage(page) {
			currentPage = page;
			fetchBackendData();
		}

		document.addEventListener('DOMContentLoaded', function () {
			updateFilterInput(); // Dùng để set placeholder ô tìm kiếm.
			updateSortIcons(); // Để hiển thị icon sort mặc định.
			fetchBackendData(); // Lấy dữ liệu ban đầu khi trang được tải
		});
	</script>
	<script src="theme.js"></script>
</body>

</html>
